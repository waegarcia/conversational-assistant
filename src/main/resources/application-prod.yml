spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

external:
  weather:
    api:
      key: ${WEATHER_API_KEY}

jwt:
  secret: ${JWT_SECRET}

app:
  auth:
    username: ${AUTH_USERNAME}
    password: ${AUTH_PASSWORD}
